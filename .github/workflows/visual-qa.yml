name: Visual QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-qa:
    name: Visual QA Walkthrough
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.1"
          channel: stable
          cache: true

      - name: Install Python dependencies
        run: pip3 install -r visual-qa/requirements.txt

      - name: Build Flutter APK (debug)
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Run Visual QA with emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: test_device
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          script: |
            adb shell settings put system screen_off_timeout 600000
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb shell am start -n com.dejting.app/.MainActivity
            sleep 5
            mkdir -p visual-qa/output
            python3 visual-qa/navigator.py --output visual-qa/output/
            python3 visual-qa/compare.py \
              --current visual-qa/output/ \
              --baselines visual-qa/baselines/ \
              --report visual-qa/output/report.md

      - name: Upload Visual QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-report
          path: visual-qa/output/
          retention-days: 30
